<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Online - P2P Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --glass: rgba(30, 41, 59, 0.7);
            --accent-emerald: #10b981;
            --accent-indigo: #6366f1;
        }
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white; 
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
            background-attachment: fixed;
        }
        /* Board Themes Variables */
        :root { --square-white: #eeeed2; --square-black: #769656; }
        .white-1e1d7 { background-color: var(--square-white) !important; transition: background 0.3s; }
        .black-3c85d { background-color: var(--square-black) !important; transition: background 0.3s; }
        
        #myBoard { 
            border: 6px solid #334155; 
            border-radius: 16px; 
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            transition: transform 0.3s ease;
        }
        #myBoard * {
            touch-action: none;
        }
        .highlight-sq { box-shadow: inset 0 0 0 4px rgba(99, 102, 241, 0.8) !important; }
        .possible-move { 
            background-color: rgba(99, 102, 241, 0.3); 
            border-radius: 50%; 
            width: 24%; 
            height: 24%; 
            margin: 38%; 
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }
        input, button, select { touch-action: manipulation; }
        /* Mencegah auto-zoom di HP dengan font minimal 16px */
        input, select { 
            font-size: 16px !important; 
        }
        .glass { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .status-pill { transition: all 0.3s ease; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        /* Agar papan pas di HP */
        @media (max-width: 640px) { #myBoard { width: 92vw !important; height: 92vw !important; } }

        .check-sq { background: radial-gradient(circle, #fb7185 0%, #e11d48 100%) !important; }
        
        .turn-active { 
            ring: 3px solid var(--accent-indigo); 
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transform: scale(1.05);
        }

        .mic-active { color: #fb7185 !important; filter: drop-shadow(0 0 8px rgba(251, 113, 133, 0.6)); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }

        /* Chat & Reaction Styles */
        .chat-bubble { max-width: 80%; padding: 6px 12px; border-radius: 12px; font-size: 11px; line-height: 1.4; margin-bottom: 4px; animation: fadeIn 0.3s ease; }
        .chat-me { background: var(--accent-indigo); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-them { background: rgba(255,255,255,0.1); color: #cbd5e1; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .floating-emoji { 
            position: absolute; pointer-events: none; z-index: 100; font-size: 2.5rem;
            animation: emojiFloat 2s ease-out forwards; opacity: 0;
        }
        @keyframes emojiFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }

        /* Modal Styles */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(2, 6, 23, 0.9); 
            backdrop-filter: blur(10px); 
            z-index: 50; 
            align-items: center; 
            justify-content: center; 
        }
        .modal.active { display: flex; }
        .btn-gradient { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Sound Effects -->
    <audio id="sfx-move" src="https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Move.mp3"></audio>
    <audio id="sfx-capture" src="https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Capture.mp3"></audio>
    <audio id="sfx-check" src="https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Check.mp3"></audio>
    <audio id="sfx-gameover" src="https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/GenericNotify.mp3"></audio>

    <audio id="remoteAudio" autoplay></audio>

    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Sisi Kiri: Papan -->
        <div id="chessboardContainer" class="lg:col-span-2 flex flex-col items-center justify-center order-2 lg:order-1 relative">
            
            <!-- Emoji Floating Container -->
            <div id="emojiLayer" class="absolute inset-0 pointer-events-none overflow-hidden" style="z-index: 60;"></div>

            <!-- HUD Atas (Lawan) -->
            <div class="w-full max-w-[500px] mb-4 flex justify-between items-center px-3 py-2 glass rounded-2xl">
                <div class="flex items-center gap-2">
                    <div id="oppAvatar" class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-xs font-bold border border-white/10 transition-all duration-500 relative">L</div>
                    <span id="oppName" class="text-sm font-bold text-slate-400">Menunggu Lawan...</span>
                </div>
                <div id="oppStatus" class="flex items-center gap-2 px-3 py-1 bg-slate-900/50 rounded-full border border-white/5">
                    <div class="w-2 h-2 rounded-full bg-slate-600 animate-pulse"></div>
                    <span class="text-[10px] uppercase font-bold text-slate-500">Offline</span>
                </div>
            </div>

            <div id="myBoard" class="w-full max-w-[500px]"></div>
            
            <!-- HUD Bawah (Anda) -->
            <div class="w-full max-w-[500px] mt-4 flex justify-between items-center px-3 py-2 glass rounded-2xl">
                <div class="flex items-center gap-3">
                    <button onclick="toggleModal('settingsModal')" class="bg-slate-800 hover:bg-indigo-600/20 p-2.5 rounded-xl transition-all active:scale-90 border border-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </button>
                    <button id="micBtn" onclick="toggleMic()" class="bg-slate-800 hover:bg-rose-600/20 p-2.5 rounded-xl transition-all active:scale-90 border border-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                        </svg>
                    </button>
                    <div id="myAvatar" class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-xs font-bold border border-indigo-400/30 transition-all duration-500">A</div>
                    <span class="text-sm font-bold text-white uppercase tracking-widest">Anda</span>
                </div>
                <div id="gameInfo" class="text-indigo-400 font-bold text-[10px] bg-indigo-500/10 px-4 py-1.5 rounded-full border border-indigo-500/20 uppercase tracking-widest">
                    Siap Bermain
                </div>
            </div>

            <!-- Interaction Tray (Chat & Reactions) -->
            <div id="interactionTray" class="hidden w-full max-w-[500px] mt-4 flex flex-col gap-3">
                <div class="flex justify-center gap-2 py-2 glass rounded-2xl">
                    <button onclick="sendReaction('😂')" class="hover:scale-125 transition">😂</button>
                    <button onclick="sendReaction('🔥')" class="hover:scale-125 transition">🔥</button>
                    <button onclick="sendReaction('😮')" class="hover:scale-125 transition">😮</button>
                    <button onclick="sendReaction('👏')" class="hover:scale-125 transition">👏</button>
                    <button onclick="sendReaction('😠')" class="hover:scale-125 transition">😠</button>
                    <button onclick="sendReaction('👍')" class="hover:scale-125 transition">👍</button>
                </div>
                <div class="flex flex-col glass rounded-2xl overflow-hidden h-40">
                    <div id="liveChatBox" class="flex-grow p-3 overflow-y-auto flex flex-col scroll-smooth">
                        <div class="text-[10px] text-slate-500 italic text-center mb-2">Mulai obrolan...</div>
                    </div>
                    <form onsubmit="submitChat(event)" class="flex border-t border-white/5 bg-slate-950/40">
                        <input id="chatInput" type="text" placeholder="Ketik pesan..." class="bg-transparent flex-grow p-3 text-xs outline-none focus:text-white">
                        <button type="submit" class="px-4 text-indigo-400 hover:text-white transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                        </button>
                    </form>
                </div>
            </div>

            <button id="endGameBtn" onclick="endGameUI()" class="hidden mt-6 bg-rose-900/40 hover:bg-rose-600 border border-rose-500/30 p-3 px-8 rounded-full text-[10px] font-bold tracking-widest uppercase transition-all active:scale-95 shadow-lg shadow-rose-950/50">AKHIRI PERMAINAN</button>
        </div>

        <!-- Sisi Kanan: Panel Kontrol -->
        <div id="controlPanel" class="flex flex-col space-y-4 order-1 lg:order-2 animate-fade-in">
            <div class="glass p-5 rounded-2xl shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-emerald-400">CHESS ONLINE</h1>
                    <select id="gameMode" class="bg-slate-800 text-[10px] p-2 rounded-lg border border-slate-600 focus:outline-none uppercase tracking-widest font-bold">
                        <option value="p2p">🌐 Mabar</option>
                        <option value="ai">🤖 Komputer</option>
                    </select>
                </div>
                
                <!-- Setup Koneksi -->
                <div id="p2pControls" class="space-y-4">
                    <div class="bg-slate-950/60 p-4 rounded-2xl border border-white/5">
                        <label class="block text-[10px] text-slate-400 mb-2 font-bold tracking-widest uppercase opacity-60">ID Room Anda</label>
                        <div class="flex gap-2">
                            <input id="myId" readonly class="bg-transparent w-full text-base text-yellow-400 font-mono focus:outline-none select-all" value="...">
                            <button id="copyBtn" onclick="copyId()" class="text-[10px] text-white bg-slate-700 px-3 py-1 rounded-lg hover:bg-slate-600 transition active:scale-95 font-bold uppercase">Salin</button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <input id="peerId" type="text" placeholder="Masukkan ID teman..." class="glass bg-transparent p-4 rounded-2xl text-base outline-none focus:border-indigo-500/50 text-white transition-all placeholder:text-slate-600">
                        <button onclick="connectToPeer()" class="btn-gradient p-4 rounded-2xl text-[11px] font-black tracking-widest transition-all shadow-lg shadow-indigo-900/20 active:scale-95">MULAI MABAR</button>
                    </div>
                </div>

                <div id="aiControls" class="hidden space-y-3">
                    <div class="p-4 bg-indigo-500/10 rounded-2xl border border-indigo-500/20">
                        <p class="text-[11px] text-indigo-400 leading-relaxed font-medium">Lawan Engine AI Stockfish-lite. Anda bermain sebagai Putih.</p>
                    </div>
                    <button onclick="resetGame()" class="btn-gradient w-full p-4 rounded-2xl text-[11px] font-black tracking-widest transition-all shadow-lg active:scale-95">MULAI SEKARANG</button>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl flex-grow overflow-hidden flex flex-col">
                <h2 class="text-[10px] font-bold text-slate-500 tracking-widest uppercase mb-3">Log Aktivitas</h2>
                <div id="status-box" class="text-[11px] text-slate-300 space-y-2 h-28 lg:h-40 overflow-y-auto font-mono">
                    <div class="text-slate-500 italic">Siap menerima tantangan...</div>
                </div>
            </div>
            
            <button id="globalResetBtn" onclick="location.reload()" class="text-slate-700 hover:text-rose-500 text-[9px] font-black tracking-[0.3em] uppercase transition-colors">Refresh App</button>
        </div>
    </div>

    <!-- Scripting -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // Konfigurasi ID Singkat
        const APP_PREFIX = "chess-p2p-room-"; // Namespace agar tidak bentrok secara global
        function generateShortId(length = 6) {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // Tanpa I, O, 1, 0 agar tidak membingungkan
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        // Fix untuk error [Intervention]: Ignored attempt to cancel a touchmove event
        // Memaksa jQuery untuk menggunakan listener non-pasif agar preventDefault() bekerja
        jQuery.event.special.touchstart = {
            setup: function( _, ns, handle ) {
                this.addEventListener("touchstart", handle, { passive: false });
            }
        };
        jQuery.event.special.touchmove = {
            setup: function( _, ns, handle ) {
                this.addEventListener("touchmove", handle, { passive: false });
            }
        };

        var board = null
        var game = new Chess()
        var peer = new Peer(APP_PREFIX + generateShortId(4)) // Inisialisasi P2P dengan ID 4 Karakter
        var conn = null
        var currentPieceTheme = 'wikipedia'
        var myRole = null // 'w' (white) atau 'b' (black)
        var selectedSquare = null
        var gameActive = false;
        var localStream = null;
        var currentCall = null;
        var micEnabled = false;

        // Toggle Mode UI
        $('#gameMode').on('change', function() {
            const mode = $(this).val();
            if (mode === 'ai') {
                $('#p2pControls').addClass('hidden');
                $('#aiControls').removeClass('hidden');
                resetGame();
                myRole = 'w';
                $('#oppName').text('Komputer (AI)');
                $('#oppAvatar').text('🤖').addClass('bg-emerald-600').removeClass('bg-slate-700');
                $('#oppStatus div').addClass('bg-emerald-500').removeClass('bg-slate-600');
                $('#gameInfo').text("Mode AI: Giliran Anda");
                updateVisualTurn();
                startGameUI(); // Fokus ke papan catur
            } else {
                $('#p2pControls').removeClass('hidden');
                $('#aiControls').addClass('hidden');
                location.reload();
                endGameUI(); // Kembali ke tampilan awal
            }
        });

        function resetGame() {
            game.reset();
            board.start();
            removeHighlights();
            updateStatus();
        }

        // 1. Inisialisasi Peer ID
        peer.on('open', function(id) {
            // Tampilkan hanya bagian kode singkatnya saja ke user
            const shortId = id.replace(APP_PREFIX, '');
            $('#myId').val(shortId);
            if ($('#gameMode').val() === 'p2p') log("ID Anda siap. Silakan bagikan.");
        });

        // Handle jika ID sudah terpakai (jarang terjadi tapi mungkin)
        peer.on('error', function(err) {
            if (err.type === 'unavailable-id') {
                log("ID bentrok, mencoba membuat ID baru...");
                setTimeout(() => location.reload(), 1000);
            } else {
                console.error("PeerJS Error:", err);
            }
        });

        // 2. Menunggu Koneksi Masuk (Pemain 1)
        peer.on('connection', function(c) {
            if (conn) return; // Tolak jika sudah ada pemain lain
            conn = c;
            myRole = 'w';
            $('#oppName').text('Teman (Hitam)');
            $('#oppAvatar').text('👤').addClass('bg-blue-600').removeClass('bg-slate-700');
            $('#oppStatus div').addClass('bg-emerald-500').removeClass('bg-slate-600');
            $('#oppStatus span').text('Online').addClass('text-emerald-500');
            setupConnection();
            log("Teman terhubung! Anda sebagai Putih.");
            updateVisualTurn();
            startGameUI(); // Fokus ke papan catur
            $('#gameInfo').text("Giliran Anda (Putih)");
        }); 

        // 3. Menghubungkan ke Lawan (Pemain 2)
        function connectToPeer() {
            var peerId = $('#peerId').val();
            if ($('#gameMode').val() !== 'p2p') return;
            if (!peerId) return alert("Masukkan ID Lawan dulu!");
            
            // Tambahkan prefix kembali saat mencoba menghubungkan
            conn = peer.connect(APP_PREFIX + peerId.toUpperCase().trim());
            myRole = 'b';
            setupConnection();
            board.orientation('black');
            $('#oppName').text('Teman (Putih)');
            $('#oppAvatar').text('👤').addClass('bg-blue-600').removeClass('bg-slate-700');
            $('#oppStatus div').addClass('bg-emerald-500').removeClass('bg-slate-600');
            $('#oppStatus span').text('Online').addClass('text-emerald-500');
            log("Terhubung ke lawan! Anda sebagai Hitam.");
            updateVisualTurn();
            startGameUI(); // Fokus ke papan catur
            $('#gameInfo').text("Menunggu Putih melangkah...");
        }

        function setupConnection() {
            conn.on('data', function(packet) {
                if (packet.type === 'move') {
                    var move = game.move(packet.data);
                    board.position(game.fen());
                    handleAfterMove(move);
                } else if (packet.type === 'chat') {
                    appendChat(packet.data, false);
                } else if (packet.type === 'reaction') {
                    showFloatingEmoji(packet.data, false);
                } else if (packet.type === 'mic-status') {
                    if (packet.data === 'request') {
                        log("Lawan ingin memulai voice chat...");
                    }
                }
            });

            conn.on('open', function() {
                updateStatus();
            });

            conn.on('close', function() {
                log("Koneksi terputus.");
                location.reload();
            });
        }

        // Voice Call Logic
        peer.on('call', function(call) {
            if (confirm("Lawan memanggil Anda. Terima panggilan suara?")) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    localStream = stream;
                    call.answer(stream);
                    handleCall(call);
                    setMicUI(true);
                });
            }
        });

        // Logika Papan Catur
        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ($('#gameMode').val() === 'p2p' && !conn) return false;
            
            // Hanya bisa jalan jika giliran sesuai role
            if ((myRole === 'w' && piece.search(/^b/) !== -1) ||
                (myRole === 'b' && piece.search(/^w/) !== -1) ||
                (game.turn() !== myRole)) {
                return false;
            }
            
            selectedSquare = source;
            showPossibleMoves(source);
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            })

            if (move === null) return 'snapback'

            removeHighlights();
            
            if ($('#gameMode').val() === 'p2p' && conn) {
                conn.send({ type: 'move', data: move });
            }
            
            handleAfterMove(move);

            // Jika Lawan Komputer
            if ($('#gameMode').val() === 'ai' && !game.game_over()) {
                window.setTimeout(makeComputerMove, 500);
            }
        }

        function onSnapEnd () {
            board.position(game.fen())
        }

        // Logika Klik (Touch Support)
        $(document).on('click', '.square-55d63', function() {
            if ($('#gameMode').val() === 'p2p' && !conn) return;
            
            var square = $(this).data('square');

            // Jika sudah ada yang dipilih, coba melangkah
            if (selectedSquare) {
                var move = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q' // otomatis ratu untuk HP agar simpel
                });

                if (move === null) {
                    // Jika klik kotak lain yang ada pion kita, pindah seleksi
                    var piece = game.get(square);
                    if (piece && piece.color === myRole) {
                        selectedSquare = square;
                        showPossibleMoves(square);
                    } else {
                        selectedSquare = null;
                        removeHighlights();
                    }
                } else {
                    // Langkah valid
                    board.position(game.fen());
                    removeHighlights();
                    if ($('#gameMode').val() === 'p2p' && conn) conn.send({ type: 'move', data: move });
                    handleAfterMove(move);
                    selectedSquare = null;
                    
                    if ($('#gameMode').val() === 'ai' && !game.game_over()) {
                        window.setTimeout(makeComputerMove, 500);
                    }
                }
            } else {
                // Seleksi pertama
                var piece = game.get(square);
                if (piece && piece.color === myRole && game.turn() === myRole) {
                    selectedSquare = square;
                    showPossibleMoves(square);
                }
            }
        });

        function showPossibleMoves(sq) {
            removeHighlights();
            var moves = game.moves({ square: sq, verbose: true });
            if (moves.length === 0) return;

            $('#myBoard .square-' + sq).addClass('highlight-sq');
            for (var i = 0; i < moves.length; i++) {
                $('#myBoard .square-' + moves[i].to).append('<div class="possible-move"></div>');
            }
        }

        function removeHighlights() {
            $('#myBoard .square-55d63').removeClass('highlight-sq');
            $('.possible-move').remove();
            $('.check-sq').removeClass('check-sq');
        }

        // AI Sederhana
        function makeComputerMove() {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;

            // Cari langkah "makan" atau acak
            var randomIdx = Math.floor(Math.random() * possibleMoves.length);
            var move = possibleMoves[randomIdx];
            
            game.move(move);
            board.position(game.fen());
            handleAfterMove(move);
            log("AI Melangkah: " + move);
        }

        // Fungsi Gabungan Setelah Langkah Selesai
        function handleAfterMove(move) {
            updateStatus();
            
            if (!move) return;

            // Suara
            if (move.captured) playSound('capture');
            else if (game.in_check()) playSound('check');
            else playSound('move');
            
            if (game.game_over()) setTimeout(() => playSound('gameover'), 500);

            updateVisualTurn();
        }

        function updateVisualTurn() {
            const turn = game.turn();
            if (turn === myRole) {
                $('#myAvatar').addClass('turn-active');
                $('#oppAvatar').removeClass('turn-active');
            } else {
                $('#oppAvatar').addClass('turn-active');
                $('#myAvatar').removeClass('turn-active');
            }
        }

        function updateStatus() {
            var turn = game.turn() === 'w' ? "Putih" : "Hitam";
            var statusText = "Giliran: " + turn;

            if (game.in_checkmate()) statusText = "GAME OVER: " + turn + " Kalah!";
            else if (game.in_draw()) statusText = "GAME OVER: Remis!";
            
            $('#gameInfo').text(statusText);

            if (game.history().length > 0) log("Langkah: " + game.history().slice(-1)[0]);
        }

        function findKing(color) {
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    var square = String.fromCharCode(97 + i) + (j + 1); 
                    var piece = game.get(square);
                    if (piece && piece.type === 'k' && piece.color === color) return square;
                }
            }
        }

        // Mic Features
        window.toggleMic = async function() {
            if (!conn) return alert("Harus terhubung dengan lawan dulu!");
            
            if (micEnabled) {
                // Matikan Mic
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                if (currentCall) currentCall.close();
                setMicUI(false);
            } else {
                // Hidupkan Mic
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    localStream = stream;
                    const call = peer.call(conn.peer, stream);
                    handleCall(call);
                    setMicUI(true);
                    conn.send({ type: 'mic-status', data: 'request' });
                } catch (err) {
                    alert("Gagal mengakses mikrofon. Pastikan izin diberikan.");
                    console.error(err);
                }
            }
        }

        function handleCall(call) {
            currentCall = call;
            call.on('stream', function(remoteStream) {
                const audio = document.getElementById('remoteAudio');
                audio.srcObject = remoteStream;
                // Browser butuh interaksi user untuk autoplay audio
                audio.play().catch(e => console.log("Audio play blocked, waiting for interaction"));
            });
            
            call.on('close', () => {
                setMicUI(false);
                log("Panggilan suara berakhir.");
            });
        }

        function setMicUI(active) {
            micEnabled = active;
            const $btn = $('#micBtn');
            const $icon = $btn.find('svg');
            
            if (active) {
                $icon.addClass('mic-active');
                $btn.addClass('border-rose-500/50 bg-rose-500/10');
            } else {
                $icon.removeClass('mic-active');
                $btn.removeClass('border-rose-500/50 bg-rose-500/10');
            }
        }

        // Interaction Features (Chat & Reactions)
        window.sendReaction = function(emoji) {
            if (conn) conn.send({ type: 'reaction', data: emoji });
            showFloatingEmoji(emoji, true);
        }

        function showFloatingEmoji(emoji, isMe) {
            const $layer = $('#emojiLayer');
            const $emoji = $('<div class="floating-emoji">' + emoji + '</div>');
            
            // Tentukan posisi awal (kiri untuk saya, kanan untuk lawan, atau acak)
            const xPos = isMe ? '20%' : '80%';
            $emoji.css({ left: xPos, bottom: '20%' });
            
            $layer.append($emoji);
            setTimeout(() => $emoji.remove(), 2000);
            if (!isMe) playSound('check'); // Gunakan sfx skak sebagai notifikasi reaksi
        }

        window.submitChat = function(e) {
            e.preventDefault();
            const $input = $('#chatInput');
            const msg = $input.val().trim();
            if (!msg) return;
            
            if (conn) conn.send({ type: 'chat', data: msg });
            appendChat(msg, true);
            $input.val('');
        }

        function appendChat(msg, isMe) {
            const $box = $('#liveChatBox');
            const typeClass = isMe ? 'chat-me' : 'chat-them';
            const $msg = $('<div class="chat-bubble ' + typeClass + '">' + msg + '</div>');
            
            $box.append($msg);
            $box.scrollTop($box[0].scrollHeight);
        }

        // Fungsi untuk mengelola tampilan UI saat game dimulai/berakhir
        function startGameUI() {
            gameActive = true;
            $('#controlPanel').addClass('hidden');
            $('#chessboardContainer').removeClass('lg:col-span-2').addClass('lg:col-span-3');
            $('#endGameBtn').removeClass('hidden');
            $('#interactionTray').removeClass('hidden');
            $('#globalResetBtn').addClass('hidden');
        }

        window.endGameUI = function() {
            gameActive = false;
            $('#controlPanel').removeClass('hidden');
            $('#chessboardContainer').removeClass('lg:col-span-3').addClass('lg:col-span-2');
            $('#endGameBtn').addClass('hidden');
            $('#globalResetBtn').removeClass('hidden');
            location.reload(); // Reset semua state
        }

        window.applyTheme = function(white, black, btn) {
            document.documentElement.style.setProperty('--square-white', white);
            document.documentElement.style.setProperty('--square-black', black);
            $('.theme-btn').removeClass('active border-emerald-500/50').addClass('border-white/5');
            $(btn).addClass('active border-indigo-500/50').removeClass('border-white/5');
        }

        window.applyPieces = function(type, btn) {
            currentPieceTheme = type;
            $('.piece-btn').removeClass('active border-indigo-500/50').addClass('border-white/5');
            $(btn).addClass('active border-indigo-500/50').removeClass('border-white/5');
            
            var currentPos = board.position();
            var currentOri = board.orientation();
            board.destroy();
            
            // Menggunakan CDN yang lebih andal untuk berbagai tema bidak
            const themePath = type === 'wikipedia' 
                ? 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
                : 'https://cdn.jsdelivr.net/gh/clarkerubber/chessboardjs-themes@master/public/img/chesspieces/' + type + '/{piece}.png';

            config.pieceTheme = themePath;
            board = Chessboard('myBoard', config);
            board.position(currentPos, false);
            board.orientation(currentOri);
        }

        window.toggleModal = function(id) {
            const $modal = $('#' + id);
            $modal.toggleClass('active');
            $modal.css('display', $modal.hasClass('active') ? 'flex' : 'none');
        }

        window.copyId = function() {
            var idVal = $('#myId').val();
            navigator.clipboard.writeText(idVal);
            
            const $btn = $('#copyBtn');
            const originalText = $btn.text();
            $btn.text("OK!").addClass('bg-indigo-600');
            setTimeout(() => {
                $btn.text(originalText).removeClass('bg-indigo-600');
            }, 2000);
        }

        function playSound(id) {
            document.getElementById('sfx-' + id).play();
        }

        function log(msg) {
            $('#status-box').prepend('<div class="flex gap-2"><span class="text-emerald-500">→</span><span>' + msg + '</span></div>');
        }

        // Inisialisasi Papan Pertama Kali
        config = {
            draggable: true,
            moveSpeed: 'slow',
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        }
        board = Chessboard('myBoard', config)

        // Handle Resize agar pas di layar HP
        $(window).resize(function() {
            board.resize();
        });
        setTimeout(() => board.resize(), 500);
    </script>

    <!-- Settings Modal (Diletakkan di luar kontainer utama untuk stabilitas visual) -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="glass p-6 rounded-3xl w-[90%] max-w-md">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-emerald-400">PENGATURAN</h2>
                <button onclick="toggleModal('settingsModal')" class="text-slate-400">✕</button>
            </div>
            
            <div class="space-y-6">
                <!-- Theme Selector -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Tema Papan</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="applyTheme('#edeed1', '#779556', this)" class="theme-btn active bg-slate-800 p-3 rounded-xl border border-emerald-500/50 flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#779556]"></div> <span class="text-[11px]">Green</span>
                        </button>
                        <button onclick="applyTheme('#ebecd0', '#739552', this)" class="theme-btn bg-slate-800 p-3 rounded-xl border border-white/5 flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#739552]"></div> <span class="text-[11px]">Lichess</span>
                        </button>
                        <button onclick="applyTheme('#dee3e6', '#8ca2ad', this)" class="theme-btn bg-slate-800 p-3 rounded-xl border border-white/5 flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#8ca2ad]"></div> <span class="text-[11px]">Bases</span>
                        </button>
                        <button onclick="applyTheme('#e2e2e2', '#525252', this)" class="theme-btn bg-slate-800 p-3 rounded-xl border border-white/5 flex items-center gap-2">
                            <div class="w-4 h-4 rounded bg-[#525252]"></div> <span class="text-[11px]">Grey</span>
                        </button>
                    </div>
                </div>

                <!-- Pieces Selector -->
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Gaya Bidak</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="applyPieces('wikipedia', this)" class="piece-btn active bg-slate-800 p-3 rounded-xl border border-emerald-500/50 text-[11px]">Wikipedia</button>
                        <button onclick="applyPieces('alpha', this)" class="piece-btn bg-slate-800 p-3 rounded-xl border border-white/5 text-[11px]">Alpha</button>
                        <button onclick="applyPieces('neo', this)" class="piece-btn bg-slate-800 p-3 rounded-xl border border-white/5 text-[11px]">Neo</button>
                        <button onclick="applyPieces('cburnett', this)" class="piece-btn bg-slate-800 p-3 rounded-xl border border-white/5 text-[11px]">CBurnett</button>
                    </div>
                </div>

                <div class="pt-4">
                    <button onclick="toggleModal('settingsModal')" class="w-full bg-emerald-600 p-3 rounded-xl text-xs font-bold uppercase tracking-widest">Simpan & Tutup</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
